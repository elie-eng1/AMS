
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">

    <form class="form-box">

        <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

        <h2>Teacher Upload Assignment</h2>

        <input type="text" placeholder="Assignment Title" required>

        <input type="text" placeholder="Course Name" required>

        <label style="margin-bottom:8px; display:block; font-weight:bold;">Due Date</label>
        <input type="date" required>

        <label style="margin-bottom:8px; display:block; font-weight:bold;">Upload File</label>
        <input type="file" required>

        <button type="submit">Upload Assignment</button>

    </form>

</div>
<script src="script.js"></script>
</body>
</html>
